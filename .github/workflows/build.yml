name: Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      create_release:
        description: "Create a GitHub Release with the artifacts"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    name: Build (rootful / rootless / roothide / tipa)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Theos
        uses: Randomblock1/theos-action@v1

      - name: Read package version
        id: meta
        run: |
          VERSION="$(awk -F': ' '/^Version:/ {print $2; exit}' control | tr -d '[:space:]')"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Package version: $VERSION"

      - name: Build all variants
        env:
          THEOS: ${{ github.workspace }}/theos
        run: |
          chmod +x scripts/release.sh
          ./scripts/release.sh

      - name: List artifacts
        run: ls -al "release/v${{ steps.meta.outputs.version }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VansonMod-v${{ steps.meta.outputs.version }}
          path: |
            release/v${{ steps.meta.outputs.version }}/*.deb
            release/v${{ steps.meta.outputs.version }}/*.tipa
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || inputs.create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', steps.meta.outputs.version) }}
          name: VansonMod v${{ steps.meta.outputs.version }}
          generate_release_notes: true
          files: |
            release/v${{ steps.meta.outputs.version }}/*.deb
            release/v${{ steps.meta.outputs.version }}/*.tipa
